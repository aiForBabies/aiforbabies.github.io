<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — AI for Babies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FAFAF8;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .code {
      font-size: 80px;
      font-weight: 800;
      letter-spacing: -4px;
      color: #2563EB;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 15px;
      color: #6B7280;
      margin-bottom: 32px;
      max-width: 380px;
    }
    a {
      font-size: 14px;
      font-weight: 600;
      color: #2563EB;
      text-decoration: none;
      padding: 10px 20px;
      border: 1.5px solid #2563EB;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    a:hover { background: #2563EB; color: #fff; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>This concept doesn't exist yet.</h1>
  <p>Or it does exist and we haven't gotten to it. Either way, the glossary has 30 terms that do work.</p>
  <a href="https://aiforbabies.github.io/">Back to the glossary</a>
</body>
</html>
